<div class="login-container">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-card">
        <h2>Sign In</h2>
        <p>Please enter your credentials to manage your tasks.</p>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" formControlName="email" placeholder="e.g., admin@task.com" />
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" formControlName="password" placeholder="••••••••" />
        </div>

        <button type="submit" [disabled]="loginForm.invalid">Login</button>

        <div class="footer-note">
            <small>Task Management System v1.0</small>
        </div>
    </form>
</div>
