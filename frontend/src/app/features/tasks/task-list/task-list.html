<div class="tasks-container">
  <div class="header">
    <h1>My Project Tasks</h1>
    <p>Manage your daily activities and progress</p>
  </div>

  @if (authService.isAdmin()) {
    <button (click)="showForm = true">Add Task</button>
  }

  @if (showForm) {
    <app-task-form (taskAdded)="onTaskAdded()" />
  }

  <div class="task-grid">
    @for (task of tasks; track task.id) {
      <div class="task-card">
        <div class="status-badge" [attr.data-status]="task.status">
          {{ task.status }}
        </div>
        <h3>{{ task.title }}</h3>
        <p>{{ task.description }}</p>

        <small>User ID: {{ task.userId }}</small>

        @if (authService.isAdmin()) {
          <button (click)="deleteTask(task.id)">Delete</button>
        }
      </div>
    } @empty {
      <div class="empty-state">No tasks found.</div>
    }
  </div>
</div>
